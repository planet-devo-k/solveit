name: Rule Monitor Week

on:
  schedule:
    - cron: "0 15 * * 6" # UTC 기준 (KST 일요일 0시)
    - cron: "0 11 * * 0" # UTC 기준 (KST 일요일 20시)
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  pull-requests: read
  issues: read

jobs:
  monitor-rules:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run rule_monitor_week script
        id: monitor_step
        uses: actions/github-script@v7
        env:
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/rule_monitor_week.js
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { default: run } = await import(process.env.SCRIPT_FULL_PATH);
            return await run({ github, context, core });

      - name: send discord notification
        if: steps.monitor_step.outputs.discussion != 'null' && steps.monitor_step.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID_ALERT: ${{ secrets.DISCORD_CHANNEL_ID_ALERT }}
          DISCORD_CHANNEL_ID_DISCUSSION: ${{ secrets.DISCORD_CHANNEL_ID_DISCUSSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_NOTIFIER }}
          NOTIFIER_DISCUSSION_PATH: ${{ github.workspace }}/.github/scripts/notifier_discussion.js
          NOTIFIER_ALERT_PATH: ${{ github.workspace }}/.github/scripts/notifier_alert.js
          RESULT_DATA: ${{ steps.monitor_step.outputs.result}}
        with:
          script: |
            const data = JSON.parse(process.env.RESULT_DATA);

            // 1. 미완료자 알림 (Alert Notifier 사용)
            if (data.incompleteTable) {
              process.env.DISCORD_CHANNEL_ID = process.env.DISCORD_CHANNEL_ID_ALERT;
              const { default: alert } = await import(process.env.NOTIFIER_ALERT_PATH);
              
              await alert({
                github, context, core,
                data: {
                  content: "주간 스터디 마감",
                  title: "MISSING SUBMISSIONS",
                  description: "이번 주 활동 집계가 끝났습니다.\n아래 분들은 다음 주에 더 힘내봐요!",
                  fields: [
                    {
                      name: "\u200B",
                      value: `${data.incompleteTable}`, 
                      inline: false
                    }
                  ],
                  footer: "일요일 오후 8시 기준 자동 집계"
                }
              });
            }

            // 2. 주간 리포트 알림 (Discussion Notifier 사용)
            if (data.discussion) {
              process.env.DISCORD_CHANNEL_ID = process.env.DISCORD_CHANNEL_ID_DISCUSSION;
              const { default: notifyReport } = await import(process.env.NOTIFIER_DISCUSSION_PATH);
              await notifyReport({ github, context, core, data: data.discussion });
            }
