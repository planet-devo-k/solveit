name: Notifier Discussion

on:
  discussion:
    types: [created]
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    permissions:
      discussions: read
      contents: read

    env:
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID_DISCUSSION }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN_NOTIFIER }}
      SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/notifier_discussion.js
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: notify discord on discussion created
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { default: run } = await import(process.env.SCRIPT_FULL_PATH);
            await run({ github, context, core });
