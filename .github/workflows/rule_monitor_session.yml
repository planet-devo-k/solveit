name: Rule Monitor Session

on:
  schedule:
    - cron: "0 13 * * 0"
  workflow_dispatch:

jobs:
  monitor-rules:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      discussions: write
      pull-requests: read
      issues: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run rule monitor session script
        id: monitor_step
        uses: actions/github-script@v7
        env:
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/rule_monitor_session.js
        with:
          # github-token: ${{ secrets.GH_PAT_PLANET_DEVO_K }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { default: run } = await import(process.env.SCRIPT_FULL_PATH);
            return await run({ github, context, core });
            // return된 데이터가 steps.monitor_step.outputs.result에 저장됩니다.

      - name: send discord notification
        if: steps.monitor_step.outputs.discussion_title != 'null' && steps.monitor_step.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID_DISCUSSION }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_ALERT }}
          NOTIFIER_DISCUSSION_PATH: ${{ github.workspace }}/.github/scripts/notifier_discussion.js
          RESULT_DATA: ${{ steps.monitor_step.outputs.result }}
        with:
          script: |
            const { default: notify } = await import(process.env.NOTIFIER_DISCUSSION_PATH);
            const data = JSON.parse(process.env.RESULT_DATA);
            await notify({ github, context, core, discussion: data });
