name: Notifier Alert

on:
  schedule:
    - cron: "0 10 * * 0" # KST 매주 일요일 오후 7시
  workflow_dispatch:

permissions:
  contents: read
  discussions: read
  pull-requests: read

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 미수행자 데이터 추출
        id: monitor_step
        uses: actions/github-script@v7
        with:
          script: |
            const { default: run } = await import('${{ github.workspace }}/.github/scripts/rule-monitor-week.js');
            return await run({ github, context, core });

      - name: send discord notification
        if: steps.monitor_step.outputs.result != 'null'
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID_ALERT }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_ALERT }}
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/senders/notifier-alert.js
          RESULT_DATA: ${{ steps.monitor_step.outputs.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const data = JSON.parse(process.env.RESULT_DATA);
            const { default: alert } = await import(process.env.SCRIPT_FULL_PATH);
            await alert({ github, context, core, data: data });
