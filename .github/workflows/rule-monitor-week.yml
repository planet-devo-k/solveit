name: Rule Monitor Week

on:
  schedule: # UTC 기준 (KST 일요일 0시)
    - cron: "0 11 * * 0" # UTC 기준 (KST 일요일 20시)
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  pull-requests: read
  issues: read

jobs:
  monitor-rules:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run rule_monitor_week script
        id: monitor_step
        uses: actions/github-script@v7
        env:
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/rule-monitor-week.js
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { default: run } = await import(process.env.SCRIPT_FULL_PATH);
            return await run({ github, context, core });

      - name: send discord notification
        if: steps.monitor_step.outputs.discussion != 'null' && steps.monitor_step.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID_POST }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_NOTIFIER }}
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/senders/notifier-discussion.js
          RESULT_DATA: ${{ steps.monitor_step.outputs.result}}
        with:
          script: |
            const data = JSON.parse(process.env.RESULT_DATA);
            const { default: notifyReport } = await import(process.env.SCRIPT_FULL_PATH);
            await notifyReport({ github, context, core, data: data });
