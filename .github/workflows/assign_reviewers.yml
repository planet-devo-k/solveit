name: Assign Reviewers

on:
  pull_request:
    types: [opened]

jobs:
  assign-reviewers:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run assignment script
        uses: actions/github-script@v7
        with:
          script: |
            const { default: run } = await import('${{ github.workspace }}/.github/scripts/assign_reviewers.js');
            await run({ github, context, core });
