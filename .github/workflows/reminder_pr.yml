name: Reminder PR

on:
  schedule:
    - cron: "0 0 * * 5" # 매주 금요일 9:00 (UTC 기준으로 금 00:00)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  send_message:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: send pr reminder to discord
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID_PR }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_REMINDER }}
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/senders/reminder_pr.js
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { default: remind } = await import(process.env.SCRIPT_FULL_PATH);
            await remind({ github, context, core });
