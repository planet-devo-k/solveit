name: Reminder PR

on:
  schedule:
    - cron: "0 0 * * 5" # 매주 금요일 9:00 (UTC 기준으로 금 00:00)
  workflow_dispatch:

jobs:
  send_message:
    runs-on: ubuntu-latest
    env:
      DISCORD_CHANNEL_ID: ${{secrets.DISCORD_CHANNEL_ID_PR}}
      REMINDER_BOT_TOKEN: ${{secrets.REMINDER_BOT_TOKEN}}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: send pr reminder to discord
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const discordPayload = {
                content: "잊지 말고 PR 생성하고 코드 리뷰 하자!",
                embeds: [
                  {
                    title: "PR REMINDER\n━━━━━━━━━━━━━━━━━━━━━━",
                    color: 16374876,
                    fields: [
                      {
                        name: "Deadline",
                        value: " ✓ PR 토요일 자정 \n ✓ 리뷰 일요일 오후 8시"
                      }
                    ]
                  }
                ]
              };

              const res = await fetch(`https://discord.com/api/v10/channels/${process.env.DISCORD_CHANNEL_ID}/messages`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bot ${process.env.REMINDER_BOT_TOKEN}`
                },
                body: JSON.stringify(discordPayload)
              });

              if (!res.ok) throw new Error(`Discord API error: ${res.status}`);
              console.log("리마인더 알림 전송 완료");

            } catch (error) {
              console.error("알림 전송 실패:", error.message);
            }
