name: Reminder Solveit

on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 9:00 (KST, UTC+9)
  workflow_dispatch:
    inputs:
      test:
        description: "날짜 체크 건너뛰기 (테스트용)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  send_message:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: send solveit reminder to discord
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID_REMINDER }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_REMINDER }}
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/senders/reminder-solveit.js
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const test = '${{ inputs.test }}' === 'true';
            const { default: remind } = await import(process.env.SCRIPT_FULL_PATH);
            await remind({ github, context, core, test });
