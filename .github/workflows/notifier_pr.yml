name: Notifier PR

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    env:
      DISCORD_CHANNEL_ID: ${{secrets.DISCORD_CHANNEL_ID_PR}}
      BOT_TOKEN: ${{secrets.REMINDER_BOT_TOKEN}}

    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: notify discord on PR created
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
               owner: context.repo.owner,
               repo: context.repo.repo,
               pull_number: context.issue.number,
             });

             const reviewers = pr.requested_reviewers.map(r => `@${r.login}`).join(", ");

             const discordPayload = {
               content: "새로운 PR이 생성되었습니다. 코드 리뷰가 기다리고 있어요.",
               embeds: [{
                 title: "NEW PR",
                 description: `[${pr.title}](${pr.html_url})`,
                 color: 5815039,
                 fields: [
                   { name: "작성자", value: pr.user.login, inline: true },
                   { name: "지정 리뷰어", value: reviewers || "지정 중...", inline: true },
                 ]
               }]
             };

             await fetch(`https://discord.com/api/v10/channels/${process.env.DISCORD_CHANNEL_ID}/messages`, {
               method: 'POST',
               headers: {
                 'Content-Type': 'application/json',
                 'Authorization': `Bot ${process.env.BOT_TOKEN}`
               },
               body: JSON.stringify(discordPayload)
             });
