name: Alert Deadline

on:
  schedule:
    - cron: "0 10 * * 0" # KST 매주 일요일 오후 7시
  workflow_dispatch:
    inputs:
      test:
        description: "테스트할 주차 번호 (비워두면 현재 날짜 기준)"
        required: false
        type: number
        # default: 2

permissions:
  contents: read
  pull-requests: read

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 미수행자 집계
        id: deadline_step
        uses: actions/github-script@v7
        with:
          script: |
            const test = Number('${{ inputs.test }}') || null;
            const { default: run } = await import('${{ github.workspace }}/.github/scripts/alert-deadline.js');
            return await run({ github, context, core, test });

      - name: send discord alert
        if: steps.deadline_step.outputs.result != 'null' && steps.deadline_step.outputs.result != ''
        uses: actions/github-script@v7
        env:
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID_ALERT }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_ALERT }}
          SCRIPT_FULL_PATH: ${{ github.workspace }}/.github/scripts/senders/alert-deadline.js
          RESULT_DATA: ${{ steps.deadline_step.outputs.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const data = JSON.parse(process.env.RESULT_DATA);
            const { default: alert } = await import(process.env.SCRIPT_FULL_PATH);
            await alert({ github, context, core, data: data });
